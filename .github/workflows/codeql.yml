name: CodeQL

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

  schedule:
    - cron: "23 3 * * 1"

  workflow_dispatch:

permissions:
  contents: read
  actions: read
  security-events: write
  packages: read

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-interpreted:
    name: Analyze ${{ matrix.language }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        language:
          - actions
          - javascript-typescript
          - python

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  analyze-swift:
    name: Analyze Swift
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Initialize ChartLens submodule
        run: git submodule update --init ChartLens

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          build-mode: manual

      - name: Build Swift project
        run: |
          set -o pipefail

          xcodebuild \
            -workspace wifi-lens.xcworkspace \
            -scheme "WiFi Lens" \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:swift"
