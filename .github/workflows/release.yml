name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (for example v1.4.2 or 1.4.2)"
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_CONFIG: Release
  KEYCHAIN_PW: "ci-temporary-keychain-password"

jobs:
  release:
    runs-on: macos-26
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SPARKLE_VERSION: "2.9.2"
      ARCHIVE_PATH: ${{ github.workspace }}/build/WiFiLens.xcarchive
      EXPORT_PATH: ${{ github.workspace }}/build/export
      DMG_BASENAME: WiFiLens
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Release Ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW_TAG="${{ github.event.inputs.tag }}"
            case "$RAW_TAG" in
              v*) RELEASE_TAG="$RAW_TAG" ;;
              *) RELEASE_TAG="v$RAW_TAG" ;;
            esac
            git checkout "refs/tags/$RELEASE_TAG"
          else
            RELEASE_TAG="${GITHUB_REF#refs/tags/}"
          fi

          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"

      - name: Init ChartLens submodule
        run: git submodule update --init ChartLens

      - name: Import Developer ID Certificate
        run: |
          CERT_PATH="$RUNNER_TEMP/developer-id.p12"
          echo "${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}" | base64 -d > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PW" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PW" build.keychain
          security import "$CERT_PATH" -k build.keychain -P "${{ secrets.P12_PASSWORD }}" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" build.keychain

          IDENTITY=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Create Export Options
        run: |
          EXPORT_OPTIONS_PLIST="$RUNNER_TEMP/ExportOptions.plist"
          cat > "$EXPORT_OPTIONS_PLIST" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>export</string>
            <key>method</key>
            <string>developer-id</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Developer ID Application</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
          </dict>
          </plist>
          EOF
          echo "EXPORT_OPTIONS_PLIST=$EXPORT_OPTIONS_PLIST" >> "$GITHUB_ENV"

      - name: Archive Release
        run: |
          rm -rf "$ARCHIVE_PATH" "$EXPORT_PATH"

          xcodebuild archive \
            -workspace wifi-lens.xcworkspace \
            -scheme "WiFi Lens" \
            -configuration "$RELEASE_CONFIG" \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            ENABLE_HARDENED_RUNTIME=YES \
            OTHER_CODE_SIGN_FLAGS="--timestamp"

      - name: Export Archived App
        run: |
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS_PLIST"

      - name: Discover Exported App
        run: |
          APP_PATH=$(find "$EXPORT_PATH" -maxdepth 1 -name "*.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Exported app not found in $EXPORT_PATH" >&2
            exit 1
          fi

          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

      - name: Verify Exported App Signatures
        run: |
          codesign --verify --deep --strict --verbose=4 "$APP_PATH"

      - name: Verify Sparkle Entitlements Isolation
        run: |
          MAIN_ENTITLEMENTS_PATH="$RUNNER_TEMP/main-app.entitlements.plist"
          SPARKLE_XPC_DIR="$APP_PATH/Contents/Frameworks/Sparkle.framework/Versions/Current/XPCServices"

          if [ ! -d "$SPARKLE_XPC_DIR" ]; then
            echo "Expected Sparkle XPC directory missing: $SPARKLE_XPC_DIR" >&2
            exit 1
          fi

          codesign -d --entitlements :- "$APP_PATH" > "$MAIN_ENTITLEMENTS_PATH"
          cat "$MAIN_ENTITLEMENTS_PATH"

          export MAIN_ENTITLEMENTS_PATH
          export SPARKLE_XPC_DIR
          python3 <<'PY'
          import glob
          import os
          import plistlib
          import subprocess
          import sys

          main_path = os.environ["MAIN_ENTITLEMENTS_PATH"]
          xpc_dir = os.environ["SPARKLE_XPC_DIR"]

          explicit_forbidden = {
              "com.apple.security.app-sandbox",
              "com.apple.security.device.bluetooth",
              "com.apple.security.files.user-selected.read-write",
              "com.apple.security.inherit",
              "com.apple.security.network.client",
              "com.apple.security.network.server",
              "com.apple.security.personal-information.location",
          }
          forbidden_prefixes = (
              "com.apple.security.device.",
              "com.apple.security.files.",
              "com.apple.security.personal-information.",
          )

          def load_entitlements(path: str) -> dict:
              with open(path, "rb") as fh:
                  data = fh.read().strip()
              return plistlib.loads(data) if data else {}

          def is_enabled(value) -> bool:
              if isinstance(value, bool):
                  return value
              return value is not None

          main_entitlements = load_entitlements(main_path)
          forbidden_keys = set(explicit_forbidden)
          for key, value in main_entitlements.items():
              if not key.startswith("com.apple.security."):
                  continue
              if key == "com.apple.security.temporary-exception.mach-lookup.global-name":
                  continue
              if is_enabled(value):
                  forbidden_keys.add(key)

          xpc_paths = sorted(glob.glob(os.path.join(xpc_dir, "*.xpc")))
          if not xpc_paths:
              print(f"No Sparkle XPC services found in {xpc_dir}", file=sys.stderr)
              sys.exit(1)

          violations = []
          for xpc_path in xpc_paths:
              entitlements_path = os.path.join(
                  os.environ["RUNNER_TEMP"],
                  f"{os.path.basename(xpc_path)}.entitlements.plist",
              )
              with open(entitlements_path, "wb") as fh:
                  subprocess.run(
                      ["codesign", "-d", "--entitlements", ":-", xpc_path],
                      check=True,
                      stdout=fh,
                  )
              entitlements = load_entitlements(entitlements_path)
              print(f"--- {xpc_path} ---")
              with open(entitlements_path, "r", encoding="utf-8", errors="ignore") as fh:
                  sys.stdout.write(fh.read())

              for key, value in entitlements.items():
                  if not is_enabled(value):
                      continue
                  if key in forbidden_keys or key.startswith(forbidden_prefixes):
                      violations.append((xpc_path, key))

          if violations:
              for xpc_path, key in violations:
                  print(f"Forbidden entitlement {key} found in {xpc_path}", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Prepare App Bundle
        run: |
          ditto "$APP_PATH" "$DMG_BASENAME.app"

      - name: Create DMG
        run: |
          bash scripts/create-dmg.sh "$DMG_BASENAME.app" "$DMG_BASENAME.dmg"

      - name: Sign DMG
        run: |
          codesign --sign "$SIGNING_IDENTITY" --timestamp --options=runtime "$DMG_BASENAME.dmg"

      - name: Notarize DMG
        run: |
          echo "${{ secrets.APPLE_API_KEY_BASE64 }}" | base64 -d > "$RUNNER_TEMP/api-key.p8"

          NOTARY_EXIT=0
          xcrun notarytool submit "$DMG_BASENAME.dmg" \
            --key "$RUNNER_TEMP/api-key.p8" \
            --key-id "${{ secrets.APPLE_API_KEY_ID }}" \
            --issuer "${{ secrets.APPLE_API_ISSUER_ID }}" \
            --wait | tee "$RUNNER_TEMP/notary-output.txt" || NOTARY_EXIT=$?

          SUBMISSION_ID=$(grep -o 'id: [a-f0-9-]*' "$RUNNER_TEMP/notary-output.txt" | head -1 | cut -d' ' -f2)
          if [ -n "$SUBMISSION_ID" ]; then
            echo "--- Notarization Log ---"
            xcrun notarytool log "$SUBMISSION_ID" \
              --key "$RUNNER_TEMP/api-key.p8" \
              --key-id "${{ secrets.APPLE_API_KEY_ID }}" \
              --issuer "${{ secrets.APPLE_API_ISSUER_ID }}"
          fi
          exit $NOTARY_EXIT

      - name: Staple Notarization Ticket
        run: |
          xcrun stapler staple "$DMG_BASENAME.dmg"
          xcrun stapler validate "$DMG_BASENAME.dmg"

      - name: Verify Notarized DMG
        run: |
          spctl -a -vvv -t install "$DMG_BASENAME.dmg"

      - name: Get Version
        run: |
          VERSION="${RELEASE_TAG#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Download Sparkle Tools
        run: |
          curl -sSL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
            -o "$RUNNER_TEMP/sparkle.tar.xz"
          tar xf "$RUNNER_TEMP/sparkle.tar.xz" -C "$RUNNER_TEMP"
          SPARKLE_BIN_DIR=$(dirname "$(find "$RUNNER_TEMP" -name generate_appcast -type f | head -1)")
          echo "$SPARKLE_BIN_DIR" >> "$GITHUB_PATH"

      - name: Generate Signed Appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_ED25519_PRIVATE_KEY }}
        run: |
          echo "$SPARKLE_PRIVATE_KEY" > "$RUNNER_TEMP/sparkle-ed-key"

          mkdir -p "$RUNNER_TEMP/appcast-dir"
          cp "$DMG_BASENAME.dmg" "$RUNNER_TEMP/appcast-dir/"

          generate_appcast \
            --ed-key-file "$RUNNER_TEMP/sparkle-ed-key" \
            --download-url-prefix "https://github.com/${{ github.repository }}/releases/download/v${{ env.VERSION }}/" \
            -o appcast.xml \
            "$RUNNER_TEMP/appcast-dir"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          files: |
            ${{ env.DMG_BASENAME }}.dmg
            appcast.xml
          draft: true
          generate_release_notes: true
